<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌹 A Question For You ❤️</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:linear-gradient(135deg,#8B0000,#C21807,#FFB6C1);
    font-family:Georgia,serif;
    overflow:hidden;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:50px;
    border-radius:30px;
    text-align:center;
    box-shadow:0 0 30px rgba(255,255,255,.2);
}
h1{
    color:white;
    font-size:3rem;
}
p{
    color:white;
    margin-top:20px;
    font-size:1.3rem;
}
button{
    border:none;
    padding:18px 40px;
    font-size:1.3rem;
    border-radius:50px;
    cursor:pointer;
    transition:.3s;
}
#yes{
    background:#ff1744;
    color:white;
    margin-right:20px;
}
#yes:hover{
    transform:scale(1.1);
}
#no{
    background:white;
    color:#c21807;
    position:absolute;
}
.rose{
    position:absolute;
    top:-50px;
    font-size:30px;
    animation:fall linear infinite;
}
@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>
<body>
<div class="container">
    <h1>🌹 Will You Be My Girlfriend? 🌹</h1>
    <p>
        Out of all the people in the world,<br>
        you're the one I want by my side ❤️
    </p>
    <br><br>
    <button id="yes">YES ❤️</button>
    <button id="no">No 😭</button>
</div>
<script>
// Falling roses
for(let i=0;i<40;i++){
    let rose=document.createElement("div");
    rose.className="rose";
    rose.innerHTML="🌹";
    rose.style.left=Math.random()*100+"vw";
    rose.style.animationDuration=(4+Math.random()*6)+"s";
    rose.style.opacity=Math.random();
    document.body.appendChild(rose);
}
// Funny messages
const messages = [
"No 😭",
"Are you sure? 🥺",
"Really?? 😭",
"Think again 🌹",
"Wrong answer 😤",
"Nice try 😂",
"You know you want to ❤️",
"That's illegal 😭",
"Please? 🥹",
"Last chance 😔",
"Too late 😂"
];
let messageIndex = 0;
let size = 1;
const noBtn = document.getElementById("no");
// Runaway button
noBtn.addEventListener("mouseover",()=>{
    noBtn.style.left=Math.random()*(window.innerWidth-150)+"px";
    noBtn.style.top=Math.random()*(window.innerHeight-100)+"px";
    size*=0.8;
    noBtn.style.transform=`scale(${size})`;
    if(messageIndex<messages.length-1){
        messageIndex++;
        noBtn.innerHTML=messages[messageIndex];
    }
    if(size<0.08){
        noBtn.style.display="none";
    }
});
// YES button
document.getElementById("yes").onclick=()=>{
document.body.innerHTML=`
<div style="
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
background:linear-gradient(135deg,#8B0000,#C21807,#FFB6C1);
color:white;
font-family:Georgia,serif;
text-align:center;
padding:30px;">
<h1 style="font-size:4rem;">❤️ YAYYYY ❤️</h1>
<h2 style="margin-top:20px;">
🌹 Officially My Girlfriend 🌹
</h2>
<p style="
margin-top:35px;
font-size:1.4rem;
max-width:700px;
line-height:1.8;">
Thank you for saying yes, beautiful. ❤️<br><br>
Out of everyone, you're the person I want to make memories with, laugh with, and spend my time with. Thank you for making me smile and for being such an amazing person. 🌹🥹<br><br>
I promise to always appreciate you, support you, and do my best to make you happy. This is just the beginning, and I can't wait to see all the memories we'll create together. ❤️✨<br><br>
❤️ I love you so much, Taban. ❤️
</p>
<h2 style="
margin-top:40px;
font-size:2.2rem;
color:#fff4f4;
text-shadow:0 0 15px rgba(255,255,255,.7);">
🌹 Forever starts here 🥹❤️
</h2>
</div>
`;
};
</script>
</body>
</html>
